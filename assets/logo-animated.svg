<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <style>
      @keyframes rain {
        0% { transform: translateY(-100%); opacity: 1; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
      .matrix-char {
        font-family: 'Courier New', monospace;
        font-size: 14px;
        fill: #00ff41;
        opacity: 0.3;
        animation: rain 3s linear infinite;
      }
      .logo-text {
        font-family: 'Courier New', monospace;
        font-weight: bold;
        fill: #00ff41;
        animation: glow 2s ease-in-out infinite;
      }
      .logo-sub {
        font-family: 'Courier New', monospace;
        fill: #00ff41;
        opacity: 0.7;
      }
      .shield {
        fill: none;
        stroke: #00ff41;
        stroke-width: 2;
        animation: glow 2s ease-in-out infinite;
      }
      .bg {
        fill: #0d1117;
      }
    </style>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="800" height="200" rx="8"/>
  
  <!-- Matrix rain columns -->
  <text class="matrix-char" x="50" y="0" style="animation-delay: 0.1s">01101</text>
  <text class="matrix-char" x="100" y="0" style="animation-delay: 0.5s">10010</text>
  <text class="matrix-char" x="150" y="0" style="animation-delay: 0.8s">11001</text>
  <text class="matrix-char" x="200" y="0" style="animation-delay: 1.2s">01010</text>
  <text class="matrix-char" x="300" y="0" style="animation-delay: 0.3s">10101</text>
  <text class="matrix-char" x="400" y="0" style="animation-delay: 1.5s">01100</text>
  <text class="matrix-char" x="500" y="0" style="animation-delay: 0.7s">11010</text>
  <text class="matrix-char" x="600" y="0" style="animation-delay: 1.0s">00110</text>
  <text class="matrix-char" x="650" y="0" style="animation-delay: 0.4s">10011</text>
  <text class="matrix-char" x="700" y="0" style="animation-delay: 1.3s">01011</text>
  <text class="matrix-char" x="750" y="0" style="animation-delay: 0.6s">11100</text>
  <text class="matrix-char" x="250" y="0" style="animation-delay: 1.8s">00101</text>
  <text class="matrix-char" x="350" y="0" style="animation-delay: 2.0s">10110</text>
  <text class="matrix-char" x="450" y="0" style="animation-delay: 2.2s">01001</text>
  <text class="matrix-char" x="550" y="0" style="animation-delay: 1.6s">11011</text>
  
  <!-- Shield icon -->
  <g transform="translate(60, 50)" filter="url(#glow-filter)">
    <path class="shield" d="M50 10 L90 25 L90 60 C90 85 70 100 50 110 C30 100 10 85 10 60 L10 25 Z" stroke-width="3"/>
    <path class="shield" d="M35 55 L45 65 L65 45" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Main title -->
  <text class="logo-text" x="170" y="85" font-size="32" filter="url(#glow-filter)">LinuxSec</text>
  <text class="logo-text" x="170" y="120" font-size="20" filter="url(#glow-filter)">Home Command Center</text>
  
  <!-- Subtitle -->
  <text class="logo-sub" x="170" y="150" font-size="12">[ EDR/XDR for Linux Home Users ]</text>
  
  <!-- Version badge -->
  <rect x="170" y="160" width="50" height="18" rx="3" fill="#00ff41" opacity="0.2" stroke="#00ff41" stroke-width="0.5"/>
  <text x="178" y="173" font-family="Courier New, monospace" font-size="10" fill="#00ff41">v1.0.0</text>
  
  <!-- Terminal cursor blink -->
  <rect x="720" y="80" width="12" height="20" fill="#00ff41" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
