# Production build target: x86_64-unknown-linux-musl (static binary)
# Use: cargo build --target x86_64-unknown-linux-musl --release
# Requires: musl-tools (apt install musl-tools) or equivalent

[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"
rustflags = ["-C", "target-feature=+crt-static"]
