<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Linux Security Home Command Center — Centro de Comando de Segurança para Linux. Dashboard unificado com 16 ferramentas de segurança, correlação de eventos, resposta automática e assistente IA (IronClaw). Open source, offline-first, privacy-first." />
    <meta name="keywords" content="linux, security, dashboard, EDR, XDR, firewall, antivirus, ClamAV, Falco, osquery, IronClaw, Rust, Svelte" />
    <meta name="author" content="catitodev" />
    <meta name="theme-color" content="#0d1117" />
    <meta property="og:title" content="LinuxSec Home Command Center" />
    <meta property="og:description" content="Centro de Comando de Segurança para Linux — 16 ferramentas integradas, correlação de eventos, IA local." />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>LinuxSec — Home Command Center</title>
    <style>
      /* Loading screen styles */
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0d1117;
        transition: opacity 0.5s ease-out;
      }
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #loading-screen img {
        max-width: 480px;
        width: 90%;
        border-radius: 8px;
      }
      #loading-screen p {
        margin-top: 1.5rem;
        font-family: 'Courier New', monospace;
        color: #00ff41;
        font-size: 14px;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body class="bg-surface-primary text-text-primary min-h-screen">
    <!-- Loading screen with animated GIF -->
    <div id="loading-screen">
      <img src="/loading.gif" alt="Carregando LinuxSec Command Center..." />
      <p>> Inicializando sistema de segurança...</p>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Remove loading screen after app mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var el = document.getElementById('loading-screen');
          if (el) {
            el.classList.add('fade-out');
            setTimeout(function() { el.remove(); }, 500);
          }
        }, 2000);
      });
    </script>
  </body>
</html>
